version: '3.8'

services:
  # 1. Our Database Service (NEW!)
  database:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  # 2. Our Node.js Backend
  backend:
    build: ./backend
    ports:
      - "3000:3000"
    depends_on:
      - database

  # 3. Our Angular Frontend
  frontend:
    build: ./frontend
    ports:
      - "4200:80"
    depends_on:
      - backend

# This tells Docker to save the database files permanently on your Mac's hard drive
volumes:
  mongo-data:
